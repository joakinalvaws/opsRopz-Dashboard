name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Lint, test & security (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Unit + integration tests (por paquete + cobertura combinada)
        run: |
          # Cada Lambda es una unidad de deploy independiente con módulos del mismo
          # nombre (handler.py); se testean en procesos separados y se combina la cobertura.
          for pkg in lambdas/processor lambdas/analyzer lambdas/dlq_monitor lambdas/daily_report vps/simulator; do
            coverage run -m pytest "$pkg"
          done
          coverage combine
          coverage report --fail-under=70

      - name: Security scan (pip-audit)
        run: pip-audit -r requirements-dev.txt

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform -chdir=infra init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infra validate
